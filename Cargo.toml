[workspace]
resolver = "3"
members = [
    "bevycraft_app",
    "bevycraft_core",
    "bevycraft_render",
    "bevycraft_world",
]

[workspace.package]
authors = ["GiF"]
version = "0.1.0-a"
edition = "2024"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[workspace.dependencies]

winapi              = { version = "0.3.9", features = ["memoryapi", "winnt", "heapapi"] }
libc                = { version = "0.2.182", features = [] }
ctor                = { version = "0.6.3", features = [] }

bevycraft_core      = { path = "bevycraft_core" }
bevycraft_world     = { path = "bevycraft_world" }
bevycraft_render    = { path = "bevycraft_render" }

bevy                = { version = "0.18.0", features = ["dynamic_linking"] }
rand                = { version = "0.10.0", features = [] }
rayon               = { version = "1.11.0", features = [] }

const-builder       = { version = "0.1.5", features = [] }

lasso               = { version = "0.7.3", features = ["multi-threaded", "inline-more"] }

rapidhash           = { version = "4.4.1", features = ["default"] }
boomphf             = { version = "0.6.0", features = ["rayon"] }
crossbeam-queue     = { version = "0.3.12", features = [] }

ron                 = { version = "0.12.0", features = [] }
serde               = { version = "1.0.228", features = ["derive"] }
bitcode             = { version = "0.6.9", features = ["derive", "serde"] }

heed                = { version = "0.22.1-nested-rtxns-6", features = [] }

criterion           = { version = "0.8.1", features = [] }
